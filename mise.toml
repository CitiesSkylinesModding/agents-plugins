# Dev tooling for building/testing the plugin. NOT required to RUN the plugin:
# the shipped server is a committed, self-contained bundle launched by the user's
# own bun or node (see .mcp.json / README).
[tools]
bun = "1.3.14"
node = "22"

[tasks.build]
description = "Install deps and bundle the Gameface MCP server into server/dist/server.mjs."
dir = "server"
run = ["bun install", "bun run build"]

[tasks.typecheck]
description = "Type-check the Gameface MCP server."
dir = "server"
run = "bun run typecheck"

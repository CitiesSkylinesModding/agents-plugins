[tools]
bun = "1.3"
node = "24.4"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]

# Use "mise t" to list tasks or "mise r" to interactively select one to run!

# DEVELOPMENT TASKS
# =================

[tasks."dev:mcp-logs"]
description = "Tail and pretty-print the latest Claude Code MCP log for the gameface server."
# raw keeps stdio attached so colors render and Ctrl+C stops the tail.
raw = true
run = "bun scripts/tail-mcp-logs.ts"

[tasks."dev:deps-upgrade"]
description = "Upgrades mise-en-place, proposes upgrades for tools managed by mise, and proposes upgrades for package.json dependencies."
interactive = true
run = [
  "mise self-update",
  "mise up --interactive --bump",
  # using `mise exec bun` makes sure bun is found if a bun upgrade was just made
  "mise exec bun -- bun update --interactive",
  # make sure transitive dependencies are updated & deduplicated
  "mise exec bun -- bun update"
]

# CHECK TASKS
# ===========

# check:* are READ-ONLY (idempotent, CI-safe): they verify and write nothing.
# The in-place auto-fixers live under fix:* (see FIX TASKS).
# Run `mise fix` locally to apply, `mise check` to verify.

[tasks."check"]
description = "Verify read-only: typescript, oxlint, oxfmt, and plugin-sync. Writes nothing, run `mise fix` to auto-fix."
run = ["mise check:tsc", "mise check:oxlint", "mise check:oxfmt", "mise check:plugin-sync"]

[tasks."check:tsc"]
description = "Type-checks the server with tsc (read-only)."
dir = "{{config_root}}/plugins/coherent-gameface/mcp"
raw = true
run = "bun --bun tsc --noEmit"

[tasks."check:oxfmt"]
description = "Verifies formatting with oxfmt (read-only, `mise fix:oxfmt` writes)."
raw = true
run = "bun --bun oxfmt --check"

[tasks."check:oxlint"]
description = "Lints with oxlint, warnings denied (read-only, `mise fix:oxlint` auto-fixes)."
raw = true
run = "bun --bun oxlint --deny-warnings"

[tasks."check:plugin-sync"]
description = "Checks that the Claude and Codex plugin manifests stay in sync."
run = "bun scripts/check-plugin-sync.ts"

# No check:cs: jb cleanupcode (the C# formatter, see fix:cs) has no read-only/dry-run mode, and C#
# is inert to CI, so there is no read-only C# verify. Run `mise fix:cs` and commit; Rider formats
# live with the same engine and the same root .editorconfig.

# CHECK TASKS (AGENTS)
# ====================

[tasks."check:agents"]
description = "Verify read-only (typescript, oxlint, oxfmt, plugin-sync), output optimized for AI agents. Writes nothing."
run = [
  "mise check:agents:tsc",
  "mise check:agents:oxlint",
  "mise check:oxfmt",
  "mise check:plugin-sync"
]

[tasks."check:agents:tsc"]
description = "Type-checks the server with tsc, output optimized for AI agents."
dir = "{{config_root}}/plugins/coherent-gameface/mcp"
raw = true
run = "bun --bun tsc --noEmit --pretty false"

[tasks."check:agents:oxlint"]
description = "Lints with oxlint (read-only, warnings denied), output optimized for AI agents."
run = "bun --bun oxlint --deny-warnings --format agent"

# TEST TASKS
# ==========

[tasks.test]
description = "Run the .NET test suite (unity-devtools evaluator: parser and operator semantics)."
raw = true
run = "dotnet test agents-plugins.slnx"

# SKILL MAINTENANCE TASKS
# =======================

[tasks."skills:check-changelog"]
description = "Diff the gameface skill's baked version timeline against the live Gameface changelog."
# Network-dependent, so deliberately not part of `mise check` / CI, run manually now and then.
run = "bun scripts/check-skill-changelog.ts"

# VENDOR TASKS
# ============

[tasks."vendor:unity:reset"]
description = "Restore the unity-mono vendored submodule to its lean sparse checkout (only the Mono.Debugger.Soft sources)."
# Runs inside the submodule so git targets it; assumes the submodule is already initialized.
dir = "{{config_root}}/plugins/unity-devtools/vendor/unity-mono"
raw = true
# git/sparse plumbing, so pin bash: mise defaults to cmd on Windows.
shell = "bash -c"
# In-place sparse restore: a re-clone here would leave a standalone repo and de-link the submodule
# (its working-tree ".git" must stay a gitlink file), so we only re-apply the cone. core.longpaths
# lets the prune delete the deep vendored paths (e.g. external/llvm-project) on Windows.
run = '''
set -e
git config core.longpaths true
git sparse-checkout set --cone mcs/class/Mono.Debugger.Soft/Mono.Debugger.Soft
'''

# BUILD TASKS
# ===========

[tasks.build]
description = "Build everything: the gameface server bundle and the unity-devtools MCP tool nupkg."
run = ["mise build:gameface", "mise build:unity:pack"]

[tasks."build:gameface"]
description = "Rebuild the shipped gameface server bundle (plugins/coherent-gameface/mcp/dist/server.mjs), commit the result."
dir = "{{config_root}}/plugins/coherent-gameface/mcp"
raw = true
# The shebang banner makes the bundle work as an npm bin script. Never enable minification:
# page-context functions are serialized via .toString() and must stay readable/self-contained.
run = 'bun build src/server.ts --target=node --format=esm --banner "#!/usr/bin/env node" --outfile dist/server.mjs'

[tasks."build:unity:pack"]
description = "Pack the unity-devtools MCP server as the UnityDevtools.Mcp dotnet-tool nupkg into mcp/dist/ (gitignored; publish with publish:unity:nuget)."
dir = "{{config_root}}"
raw = true
# bash for the glob-clean; mise defaults to cmd on Windows.
shell = "bash -c"
# Wipe dist/ first so a renamed package id or an old version cannot linger and get pushed by the
# `dist/*.nupkg` glob in publish:unity:nuget.
run = "rm -rf plugins/unity-devtools/mcp/dist && dotnet pack plugins/unity-devtools/mcp/UnityDevtools.Mcp.csproj -c Release -o plugins/unity-devtools/mcp/dist"

# FIX TASKS
# =========

# fix:* WRITE in place (the counterparts to the read-only check:*). For local dev.

[tasks."fix"]
description = "Auto-fix in place: oxlint --fix then oxfmt. The read-only counterpart is `mise check`."
# Sequential, lint then format, so formatting settles after lint rewrites.
run = ["mise fix:oxlint", "mise fix:oxfmt"]

[tasks."fix:oxlint"]
description = "Auto-fixes lint issues with oxlint (writes, `mise check:oxlint` only reports)."
raw = true
run = "bun --bun oxlint --fix"

[tasks."fix:oxfmt"]
description = "Formats code in place with oxfmt (writes, `mise check:oxfmt` only verifies)."
raw = true
run = "bun --bun oxfmt"

[tasks."fix:cs"]
description = "Format the C# projects in place with jb (ReSharper) cleanupcode, honoring the root .editorconfig. Requires `dotnet tool restore` (pinned in .config/dotnet-tools.json)."
raw = true
# jb cleanupcode (same engine as Rider) with the custom "CSModCleanup" profile: applies the
# resharper_* wrapping dotnet format cannot, and the minor code-style fixes that keep the :warning
# IDE rules satisfied.
# Excludes the vendored tree and generated obj/. No --no-build: cleanups need semantics.
run = "dotnet jb cleanupcode agents-plugins.slnx --profile=\"CSModCleanup\" --settings=\"agents-plugins.sln.DotSettings\" --exclude=\"plugins/unity-devtools/vendor/**;plugins/unity-devtools/sdb/obj/**\""

# PUBLISH TASKS
# =============

[tasks.publish]
description = "Check, rebuild the bundle, then publish @csmodding/gameface-devtools-mcp to npm."
run = ["mise check", "mise build:gameface", "mise publish:npm"]

[tasks."publish:npm"]
description = "Publish the mcp/ package to npm (assumes checks and build already ran)."
dir = "{{config_root}}/plugins/coherent-gameface/mcp"
# raw keeps stdio interactive so npm can prompt for the OTP.
raw = true
run = "npm publish"

[tasks."publish:unity"]
description = "Check, test, pack, then publish the unity-devtools MCP dotnet tool to nuget.org."
run = ["mise check", "mise test", "mise build:unity:pack", "mise publish:unity:nuget"]

[tasks."publish:unity:nuget"]
description = "Push the packed UnityDevtools.Mcp nupkg to nuget.org (manual, like npm; append --api-key <key> or configure one)."
dir = "{{config_root}}/plugins/unity-devtools/mcp"
raw = true
# bash so `dist/*.nupkg` expands: mise defaults to cmd on Windows, where dotnet nuget push gets the
# literal glob and fails.
# `build:unity:pack` keeps dist/ to a single nupkg, so the glob is unambiguous.
shell = "bash -c"
run = "dotnet nuget push dist/*.nupkg --source https://api.nuget.org/v3/index.json"

# RUN TASKS
# =========

[tasks."run:server"]
description = "Run the gameface MCP server from sources (stdio transport, for quick smoke tests)."
dir = "{{config_root}}/plugins/coherent-gameface/mcp"
raw = true
run = "bun run src/server.ts"

[tasks."run:unity:mcp"]
description = "Run the unity-devtools MCP server over stdio from sources (manual smoke test; the root .mcp.json launches the same way)."
dir = "{{config_root}}/plugins/unity-devtools/mcp"
raw = true
run = "dotnet run -v q --project UnityDevtools.Mcp.csproj"

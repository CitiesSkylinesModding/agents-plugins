# Checks that pushed code passes lint/typecheck.

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: bun install --frozen-lockfile
      - run: mise check:agents
      - run: mise build:gameface
      - run: git diff --exit-code

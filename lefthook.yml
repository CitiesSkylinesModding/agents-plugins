post-checkout:
  commands:
    configure-git:
      run: git config blame.ignoreRevsFile .git-blame-ignore-revs

pre-commit:
  parallel: true
  commands:
    build-bundle:
      # Keep the committed bundle in sync with the sources; stage_fixed would only re-add the
      # staged src files, so the freshly built bundle is staged explicitly.
      root: "plugins/coherent-gameface/mcp/"
      glob: "plugins/coherent-gameface/mcp/src/*.ts"
      run: mise build:gameface && git add dist/server.mjs
    build-unity-dist:
      # The same freshness rule for the committed unity-devtools exe: any staged change to the C#
      # sources (server or sdb library) or the publishing script rebuilds and stages it.
      # Both flat and nested patterns: `**/` requires an intermediate directory, so it alone
      # would miss the flat top-level sources.
      glob: "{plugins/unity-devtools/{mcp,sdb}/*.{cs,csproj},plugins/unity-devtools/{mcp,sdb}/**/*.{cs,csproj},scripts/build-unity-mcp.ps1}"
      run: mise build:unity:mcp && git add plugins/unity-devtools/mcp/dist/unity-devtools-mcp.exe
    tsc:
      # The only tsconfig lives in the mcp workspace; only staged files under it trigger the check.
      root: "plugins/coherent-gameface/mcp/"
      glob: "*.{ts,tsx,js,json}"
      run: mise exec bun -- bun --bun tsc --noEmit
    plugin-sync:
      # The Claude and Codex plugin manifests duplicate shared metadata; keep them in sync.
      glob: "{package.json,.claude-plugin/*.json,plugins/*/package.json,plugins/*/.claude-plugin/*.json,plugins/*/.codex-plugin/*.json,scripts/check-plugin-sync.ts}"
      run: mise exec bun -- bun scripts/check-plugin-sync.ts
    oxlint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: mise exec bun -- bun --bun oxlint --deny-warnings --no-error-on-unmatched-pattern {staged_files}
    oxfmt:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,md}"
      run: mise exec bun -- bun --bun oxfmt --check --no-error-on-unmatched-pattern {staged_files}

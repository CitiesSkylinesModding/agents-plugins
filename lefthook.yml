post-checkout:
  commands:
    configure-git:
      run: git config blame.ignoreRevsFile .git-blame-ignore-revs

pre-commit:
  parallel: true
  commands:
    build-bundle:
      # Keep the committed bundle in sync with the sources; stage_fixed would only re-add the
      # staged src files, so the freshly built bundle is staged explicitly.
      root: "mcp/"
      glob: "mcp/src/*.ts"
      run: mise build && git add dist/server.mjs
    tsc:
      # The only tsconfig lives in mcp/; only staged files under it trigger the check.
      root: "mcp/"
      glob: "*.{ts,tsx,js,json}"
      run: mise exec bun -- bun --bun tsc --noEmit
    plugin-sync:
      # The Claude and Codex plugin manifests duplicate shared metadata; keep them in sync.
      glob: "{.claude-plugin/*.json,.codex-plugin/*.json,scripts/check-plugin-sync.ts}"
      run: mise exec bun -- bun scripts/check-plugin-sync.ts
    oxlint:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs}"
      run: mise exec bun -- bun --bun oxlint --deny-warnings --no-error-on-unmatched-pattern {staged_files}
    oxfmt:
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc,md}"
      run: mise exec bun -- bun --bun oxfmt --check --no-error-on-unmatched-pattern {staged_files}
